name: Deploy to Production

on:
  push:
    branches: [main]

env:
  DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}
  DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}

jobs:
  deploy:
    runs-on: self-hosted
    steps:

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Databricks CLI
        uses: databricks/setup-cli@main

      - name: Deploy to production
        run: |
          databricks bundle deploy -t prod
          databricks apps deploy databrickstv-agent-prod --source-code-path /Workspace/Users/max.fisher@databricks.com/.bundle/databrickstv-agent-app/prod/files
