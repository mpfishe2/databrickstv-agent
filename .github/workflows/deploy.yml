name: Deploy to Production

on:
  push:
    branches: [main]

env:
  DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}
  DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}
  BUNDLE_VAR_catalog_name: ${{ vars.CATALOG_NAME }}

jobs:
  deploy:
    runs-on: self-hosted
    steps:

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Databricks CLI
        uses: databricks/setup-cli@main

      - name: Deploy to production
        run: |
          databricks bundle deploy -t prod
          FILES_PATH=$(databricks bundle validate -t prod --output json | python3 -c "import sys,json; print(json.load(sys.stdin)['workspace']['file_path'])")
          databricks apps deploy databrickstv-agent-prod --source-code-path "$FILES_PATH"
